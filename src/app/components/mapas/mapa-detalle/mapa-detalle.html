@if (cargando()) {
  <div class="cargando">Cargando...</div>
} @else if (error()) {
  <div class="error">{{ error() }}</div>
} @else if (mapa()) {
  <div class="mapa-detalle">
    <h1>{{ mapa().name }}</h1>
    <p><strong>Ubicación:</strong> {{ mapa().location }}</p>
    <p><strong>Playlists:</strong> {{ mapa().playlists }}</p>
    <p><strong>Fecha de lanzamiento:</strong> {{ mapa().releaseDate }}</p>

    <button routerLink="/mapas">Volver</button>
  </div>
}
