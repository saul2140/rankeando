<div class="personajes-container">
  @if (cargando()) {
    <div class="cargando">Cargando...</div>
  }

  @if (error()) {
    <div class="error">{{ error() }}</div>
  }

  @if (!cargando() && !error()) {
    <div class="personajes-grid">
      @for (op of personajes(); track op.safename) {
        <div class="personaje-card">
          <img [src]="'assets/personajes/' + op.safename + '.png'" alt="op.name">
          <h2>{{ op.name }}</h2>
          <p><strong>Nombre real:</strong> {{ op.realname }}</p>
          <p><strong>Lado:</strong> {{ op.side }}</p>
          <p><strong>Velocidad:</strong> {{ op.speed }} | <strong>Salud:</strong> {{ op.health }}</p>
        </div>
      }
    </div>
  }


<a href="../jugadores/jugadores.html">
<button routerLink="/">Volver al inicio</button>
</a>
</div>
